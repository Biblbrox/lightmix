random_seed = 42
learning_rate = 1e-3
num_workers = 4
cache_dir = "hf://datasets"

## Spectre ViT
[imagenet1k]
num_classes = 1000
img_size = 224
in_channels = 3

[imagenet1k.spectre_vit]
batch_size = 32
val_batch_size = 64
epochs = 100
patch_size = 16
num_heads = 8
dropout = 0.001
hidden_dim = 768
adam_weight_decay = 0.01
adam_betas = [0.9, 0.999]
activation = "gelu"
num_encoders = 4
embed_dim = 512

[cifar100]
num_classes = 100
img_size = 32
in_channels = 3

[cifar100.spectre_vit]
batch_size = 8
val_batch_size = 512
epochs = 20
patch_size = 4
num_heads = 8
dropout = 0.001
hidden_dim = 768
adam_weight_decay = 0.01
adam_betas = [0.9, 0.999]
activation = "gelu"
num_encoders = 4
embed_dim = 512

[mnist]
img_size = 28
num_classes = 10
in_channels = 1

[mnist.spectre_vit]
batch_size = 8
val_batch_size = 512
epochs = 10
patch_size = 4
num_heads = 8
dropout = 0.001
hidden_dim = 256
adam_weight_decay = 0.01
adam_betas = [0.9, 0.999]
activation = "gelu"
num_encoders = 4
embed_dim = 16
