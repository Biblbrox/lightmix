[package]
name = "embed_former_train"
version = "0.0.1"
edition = "2024"

[workspace]
resolver = "2"

[dependencies]
burn = { version = "0.20.1", default-features = false, features = [
  "cuda",
  "fusion",
  "std",
  "train",
  "tui",
  "wgpu"
] }
burn-cuda = "0.20.1"
polars = { version = "0.53.0", features = [
  "async",
  "dtype-struct",
  "lazy",
  "new_streaming",
  "parquet"
] }
toml = "1.0.2"
walkdir = "2.5.0"
zune-core = "0.5.1"
zune-image = "0.5.0"
zune-imageprocs = "0.5.1"
zune-png = { version = "0.5.1" }  # ,feature=["portable-simd"]}
cubecl = { version = "0.9.0",  features = ["wgpu", "cuda", "cpu"] }
burn-cubecl = "0.20.1"

[profile.dev.package.zune-png]
opt-level = 3
