[package]
name = "embed_former_train"
version = "0.0.1"
edition = "2024"

[workspace]
resolver = "2"

[dependencies]
burn = { version = "0.20.1", default-features = false, features = [
  "cuda",
  "fusion",
  "std",
  "train",
  "tui",
  "vision",
  "wgpu"
] }
burn-cuda = "0.20.1"
polars = { version = "0.53.0", features = [
  "async",
  "lazy",
  "new_streaming",
  "parquet"
] }
walkdir = "2.5.0"
