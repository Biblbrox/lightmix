[package]
name = "embed_former_train"
version = "0.0.1"
edition = "2024"

[dependencies]
burn = { version = "0.20.1", default-features = false, features = [
  "cuda",
  "fusion",
  "std",
  "train",
  "tui",
  "wgpu",
] }
burn-cuda = "0.20.1"
polars = { version = "0.53.0", features = [
  "async",
  "dtype-struct",
  "lazy",
  "new_streaming",
  "parquet",
], default-features = false }
toml = "1.0.2"
walkdir = "2.5.0"
cubecl = { version = "0.9.0", features = ["wgpu"] }
image = "0.25.9"
burn-cubecl = "0.20.1"
